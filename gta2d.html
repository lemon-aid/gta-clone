<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0015;
  font-family:'Courier New',monospace}
#c{display:block;image-rendering:pixelated}
/* Mobile controls */
#mc{position:fixed;bottom:0;left:0;width:100%;height:240px;pointer-events:none;display:none;z-index:50}
#jb{position:absolute;bottom:80px;left:40px;width:120px;height:120px;border-radius:50%;
  border:3px solid rgba(180,100,255,.6);background:rgba(80,0,160,.4);
  pointer-events:all;touch-action:none}
#jt{position:absolute;width:50px;height:50px;border-radius:50%;
  background:radial-gradient(circle,rgba(220,150,255,.9),rgba(140,60,255,.7));
  border:2px solid rgba(255,200,255,.8);box-shadow:0 0 12px #c080ff;
  transform:translate(-50%,-50%);top:50%;left:50%;pointer-events:none}
.tb{position:absolute;border-radius:50%;pointer-events:all;touch-action:none;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:#fff;user-select:none;-webkit-user-select:none;
  width:60px;height:60px;border:3px solid rgba(255,255,255,.5);
  text-shadow:0 0 8px currentColor}
#ba{bottom:80px;right:40px;background:rgba(0,200,80,.4);border-color:#0f8;color:#0f8;box-shadow:0 0 10px #0f84}
#bb{bottom:150px;right:40px;background:rgba(255,50,50,.4);border-color:#f44;color:#f44;box-shadow:0 0 10px #f444}
#bx{bottom:80px;right:110px;background:rgba(80,150,255,.4);border-color:#48f;color:#48f;box-shadow:0 0 10px #48f4}
#by{bottom:150px;right:110px;background:rgba(255,200,0,.4);border-color:#fc0;color:#fc0;box-shadow:0 0 10px #fc04}
/* Title screen */
#overlay{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a0035 0%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.title-gta{font-size:56px;font-weight:900;letter-spacing:8px;
  background:linear-gradient(135deg,#ff80ff,#c040ff,#8000ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;filter:drop-shadow(0 0 20px #c060ff);margin-bottom:4px}
.title-sub{font-size:28px;color:#ff60ff;letter-spacing:12px;
  text-shadow:0 0 15px #ff00ff,0 0 30px #8000ff;margin-bottom:6px}
.title-badge{background:linear-gradient(135deg,#5000a0,#300060);
  border:2px solid #a040ff;border-radius:6px;padding:4px 20px;
  color:#c080ff;font-size:11px;letter-spacing:3px;margin-bottom:40px}
.mbtn{background:linear-gradient(135deg,#6000c0,#300080);color:#fff;
  border:2px solid #a060ff;padding:14px 56px;font-size:17px;font-family:monospace;
  cursor:pointer;letter-spacing:4px;margin:8px;border-radius:8px;
  transition:all .2s;box-shadow:0 0 20px #8000ff4}
.mbtn:hover{background:linear-gradient(135deg,#8020ff,#5000c0);
  box-shadow:0 0 30px #a060ff,0 0 60px #6000ff4;transform:scale(1.04)}
/* Overlays */
#pause,#died,#missionComplete{position:fixed;inset:0;z-index:90;
  display:none;flex-direction:column;align-items:center;justify-content:center}
#pause{background:rgba(10,0,30,.82);backdrop-filter:blur(4px)}
#pause h2{color:#c080ff;font-size:34px;letter-spacing:6px;margin-bottom:30px;
  text-shadow:0 0 20px #a040ff}
#died{background:rgba(80,0,0,.75)}
#died h2{color:#ff4060;font-size:42px;text-shadow:0 0 25px #ff0020;margin-bottom:16px}
#died p{color:#ffaaaa;font-size:15px}
#missionComplete{background:rgba(0,10,30,.7)}
#mcBox{background:linear-gradient(135deg,rgba(60,0,120,.9),rgba(20,0,60,.9));
  border:2px solid #c080ff;border-radius:12px;padding:28px 48px;
  display:flex;flex-direction:column;align-items:center;
  box-shadow:0 0 40px #8040ff4}
#mcTitle{color:#ffd700;font-size:24px;letter-spacing:2px;margin-bottom:10px;
  text-shadow:0 0 12px #ffaa00}
#mcReward{color:#80ff80;font-size:32px;text-shadow:0 0 15px #00ff80}
/* HUD flash */
#flashMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.75);border:2px solid #c080ff;border-radius:8px;
  padding:12px 32px;color:#fff;font-size:18px;pointer-events:none;z-index:80;
  display:none;text-align:center;letter-spacing:1px;
  box-shadow:0 0 25px #8040ff}
</style>

<script>
'use strict';
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const TILE = 64;      // px per tile (matches tileset)
const MAPSZ = 128;    // map size in tiles
const BLOCK = 16;     // tiles per city block (2 road + 14 building/sidewalk)
const HALF = MAPSZ / 2;

const T = {
  ROAD_H:0, SIDEWALK:1, GRASS:2, WATER:3,
  BFLOOR:4, BWALL:5, PARKING:6, DOOR:7, CROSS:8, ROAD_V:9
};

// Tileset UV coords (row, col) in the 4×4 tileset sheet
const TILE_UV = {
  [T.ROAD_H]:   [0,1], // horizontal road
  [T.ROAD_V]:   [0,0], // vertical road
  [T.CROSS]:    [1,2], // intersection
  [T.SIDEWALK]: [2,2], // sidewalk
  [T.GRASS]:    [2,0], // use actual grass tile if available, else fallback
  [T.WATER]:    [2,2], // fallback
  [T.BFLOOR]:   [2,2], // sidewalk
  [T.BWALL]:    [2,2], // Use sidewalk as base for building instead of parking [3,0]
  [T.PARKING]:  [3,0], // parking
  [T.DOOR]:     [2,2], // sidewalk
};
const SOLID = new Set([T.BWALL, T.WATER]);
const TCOLORS = ['#2a2a2a','#9090a0','#2a6e30','#1a3f88','#a0929a','#504848','#303048','#c87820','#2a2a2a'];

const WPNDEF = {
  0:{name:'Fists',    ammoMax:1e9, dmg:15,  rate:.5,  range:1.2, spread:0,   proj:0,col:'#faa'},
  1:{name:'Pistola',  ammoMax:12,  dmg:25,  rate:.38, range:15,  spread:.05, proj:1,col:'#aaa'},
  2:{name:'Escopeta', ammoMax:6,   dmg:40,  rate:1,   range:8,   spread:.3,  proj:5,col:'#a64'},
  3:{name:'SMG',      ammoMax:60,  dmg:12,  rate:.12, range:12,  spread:.1,  proj:1,col:'#6a4'},
  4:{name:'Rifle',    ammoMax:10,  dmg:60,  rate:.8,  range:25,  spread:.02, proj:1,col:'#a44'},
  5:{name:'Granada',  ammoMax:3,   dmg:80,  rate:1.5, range:8,   spread:0,   proj:2,col:'#4a4'},
  6:{name:'Molotov',  ammoMax:3,   dmg:15,  rate:1.2, range:6,   spread:0,   proj:3,col:'#f84'},
  7:{name:'Kit HP',   ammoMax:1,   dmg:0,   rate:.5,  range:0,   spread:0,   proj:4,col:'#f44'},
  8:{name:'Colete',   ammoMax:1,   dmg:0,   rate:.5,  range:0,   spread:0,   proj:5,col:'#44f'},
};

const VDEF = {
  sedan:    {name:'Sedan',     ms:4.5,ac:2.5,fr:1.8,tr:1.8,hp:100,w:1.5,h:.85,col:'#6688aa',carCol:0},
  muscle:   {name:'Muscle',    ms:6.0,ac:4.0,fr:2.0,tr:2.2,hp:80, w:1.6,h:.8, col:'#aa3322',carCol:1},
  van:      {name:'Van',       ms:3.5,ac:1.5,fr:1.5,tr:1.4,hp:160,w:1.8,h:1.0,col:'#888844',carCol:2},
  moto:     {name:'Moto',      ms:5.5,ac:5.0,fr:2.5,tr:2.8,hp:50, w:.8, h:.55,col:'#444',   carCol:3},
  truck:    {name:'Caminhao',  ms:2.8,ac:.8, fr:1.2,tr:1.0,hp:250,w:2.0,h:1.1,col:'#557755',carCol:4},
  ambulance:{name:'Ambulancia',ms:4.0,ac:2.0,fr:1.7,tr:1.6,hp:120,w:1.6,h:.9, col:'#eee',   carCol:5},
  police:   {name:'Policia',   ms:4.8,ac:3.2,fr:2.0,tr:2.0,hp:130,w:1.5,h:.85,col:'#2244cc',carCol:6},
};

// ═══════════════════════════════════════════════
//  ASSETS
// ═══════════════════════════════════════════════
const Assets = {
  tileset: null, charPurple: null, charGirl: null,
  charGreen: null, charGang: null, carPink: null,
  loaded: 0, total: 0,
  load(callback) {
    const defs = [
      ['tileset',    'assets/tileset.png'],
      ['charPurple', 'assets/char_purple.png'],
      ['charGirl',   'assets/char_girl.png'],
      ['charGreen',  'assets/char_green.png'],
      ['charGang',   'assets/char_gang.png'],
      ['carPink',    'assets/car_pink.png'],
      ['facades',    'assets/facades.png']
    ];
    this.total = defs.length;
    for (const [key, src] of defs) {
      const img = new Image();
      img.onload = () => { this.loaded++; if(this.loaded===this.total) callback(); };
      img.onerror = () => { this.loaded++; if(this.loaded===this.total) callback(); };
      img.src = src;
      this[key] = img;
    }
  }
};

// ═══════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════
const Aud = {
  ctx:null, _eng:null, _engG:null, _sir:null, _sirG:null, _sirOn:false,
  _rad:null, _radG:null, _radSt:0,
  init(){if(this.ctx)return;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}},
  _n(dur,vol=.3){
    if(!this.ctx)return;
    const b=this.ctx.createBuffer(1,this.ctx.sampleRate*dur,this.ctx.sampleRate);
    const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const s=this.ctx.createBufferSource(),g=this.ctx.createGain();
    s.buffer=b;g.gain.setValueAtTime(vol,this.ctx.currentTime);
    g.gain.linearRampToValueAtTime(0,this.ctx.currentTime+dur);
    s.connect(g);g.connect(this.ctx.destination);s.start();s.stop(this.ctx.currentTime+dur);
  },
  _o(type,f0,dur,vol=.3,f1=null){
    if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(f0,this.ctx.currentTime);
    if(f1!=null)o.frequency.linearRampToValueAtTime(f1,this.ctx.currentTime+dur);
    g.gain.setValueAtTime(vol,this.ctx.currentTime);
    g.gain.linearRampToValueAtTime(0,this.ctx.currentTime+dur);
    o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+dur);
  },
  shot(){this._o('sawtooth',80,.1,.5,40);this._n(.08,.35);},
  shotgun(){this._n(.15,.8);},
  explode(){this._n(1.5,.9);this._o('sawtooth',60,1.5,.5,20);},
  crash(){this._n(.25,.6);},
  step(){this._n(.04,.06);},
  money(){this._o('sine',523,.1,.3);setTimeout(()=>this._o('sine',659,.1,.3),110);},
  ding(){this._o('sine',880,.15,.4);setTimeout(()=>this._o('sine',1100,.12,.3),160);},
  death(){this._o('sine',440,1.5,.5,55);},
  pickup(){this._o('sine',660,.08,.25);},
  engine(spd,ms){
    if(!this.ctx)return;
    const f=80+(spd/ms)*240;
    if(!this._eng){
      this._eng=this.ctx.createOscillator();this._engG=this.ctx.createGain();
      this._eng.type='sawtooth';this._engG.gain.value=.05;
      this._eng.connect(this._engG);this._engG.connect(this.ctx.destination);this._eng.start();
    }
    this._eng.frequency.setTargetAtTime(f,this.ctx.currentTime,.1);
    this._engG.gain.setTargetAtTime(.05,this.ctx.currentTime,.1);
  },
  stopEngine(){
    if(!this._eng)return;
    this._engG.gain.setTargetAtTime(0,this.ctx.currentTime,.2);
    setTimeout(()=>{try{this._eng.stop();}catch(e){}this._eng=this._engG=null;},600);
  },
  sirenOn(){
    if(!this.ctx||this._sirOn)return;this._sirOn=true;
    this._sirG=this.ctx.createGain();this._sirG.gain.value=.1;this._sirG.connect(this.ctx.destination);
    this._sir=this.ctx.createOscillator();this._sir.frequency.value=880;
    this._sir.connect(this._sirG);this._sir.start();
    const t=()=>{if(!this._sirOn)return;this._sir.frequency.value=this._sir.frequency.value===880?660:880;setTimeout(t,500);};
    setTimeout(t,500);
  },
  sirenOff(){
    this._sirOn=false;
    if(this._sir){try{this._sir.stop();}catch(e){}this._sir=null;}
    if(this._sirG){this._sirG.gain.setTargetAtTime(0,this.ctx.currentTime,.1);this._sirG=null;}
  },
  radioOn(){
    if(!this.ctx||this._rad)return;
    this._rad=this.ctx.createOscillator();this._radG=this.ctx.createGain();
    this._radG.gain.value=.03;
    const vib=this.ctx.createOscillator(),vibG=this.ctx.createGain();
    vib.frequency.value=6;vibG.gain.value=10;vib.connect(vibG);vibG.connect(this._rad.frequency);vib.start();
    this._rad.type='sine';this._rad.frequency.value=[440,330,220][this._radSt];
    this._rad.connect(this._radG);this._radG.connect(this.ctx.destination);this._rad.start();
  },
  radioOff(){
    if(!this._rad)return;
    this._radG.gain.setTargetAtTime(0,this.ctx.currentTime,.2);
    setTimeout(()=>{try{this._rad.stop();}catch(e){}this._rad=this._radG=null;},500);
  },
  radioNext(){this._radSt=(this._radSt+1)%3;if(this._rad)this._rad.frequency.setTargetAtTime([440,330,220][this._radSt],this.ctx.currentTime,.1);},
};

// ═══════════════════════════════════════════════
//  WORLD GENERATION
// ═══════════════════════════════════════════════
const World = (() => {
  const SZ = MAPSZ;
  const map = new Uint8Array(SZ * SZ);
  const buildings = [];
  const vehicles = [];
  let _id = 0;

  const set = (x,y,t) => { if(x>=0&&y>=0&&x<SZ&&y<SZ) map[y*SZ+x]=t; };
  const get = (x,y) => { if(x<0||y<0||x>=SZ||y>=SZ) return T.BWALL; return map[y*SZ+x]; };
  const fill = (x,y,w,h,t) => { for(let dy=0;dy<h;dy++) for(let dx=0;dx<w;dx++) set(x+dx,y+dy,t); };
  const solid = (x,y) => SOLID.has(get(Math.floor(x),Math.floor(y)));

  function getZone(x,y){
    if(x<HALF&&y<HALF) return 'downtown';
    if(x>=HALF&&y<HALF) return 'docks';
    if(x<HALF&&y>=HALF) return 'suburbs';
    return 'industrial';
  }

  function placeBuilding(bx,by,bw,bh,zone){
    if(bw<3||bh<3) return;
    const typeMap={
      downtown:['bank','shop_weapons','mission_giver','shop_food'],
      docks:['warehouse','mission_giver','shop_weapons'],
      suburbs:['safe_house','shop_food','hospital','safe_house'],
      industrial:['factory','shop_weapons','mission_giver']
    };
    const types = typeMap[zone]||['shop_food'];
    const type = types[_id % types.length];
    const ent = type !== 'factory';
    fill(bx,by,bw,bh,T.BFLOOR);
    for(let x=bx;x<bx+bw;x++){set(x,by,T.BWALL);set(x,by+bh-1,T.BWALL);}
    for(let y=by;y<by+bh;y++){set(bx,y,T.BWALL);set(bx+bw-1,y,T.BWALL);}
    const dx=bx+Math.floor(bw/2), dy=by+bh-1;
    if(ent) set(dx,dy,T.DOOR);
    buildings.push({x:bx,y:by,w:bw,h:bh,enterable:ent,type,id:_id++,doorX:dx,doorY:dy});
  }

  function makeVehicle(type,x,y,angle){
    const d = VDEF[type];
    return {type,x,y,angle,speed:0,hp:d.hp,maxHp:d.hp,
      w:d.w,h:d.h,driver:null,col:d.col,
      burning:false,burnTimer:0,dead:false,
      id:'v'+(Math.random()*1e9|0)};
  }

  function generate(){
    map.fill(T.SIDEWALK); // base is sidewalk

    // Road grid: every BLOCK tiles, 2 tiles wide (2 lanes)
    for(let x=0;x<SZ;x+=BLOCK){
      for(let y=0;y<SZ;y++){
        set(x,y,T.ROAD_V); if(x+1<SZ) set(x+1,y,T.ROAD_V);
      }
    }
    for(let y=0;y<SZ;y+=BLOCK){
      for(let x=0;x<SZ;x++){
        // Intersections
        if(get(x,y)===T.ROAD_V) set(x,y,T.CROSS);
        else set(x,y,T.ROAD_H);
        if(y+1<SZ){
          if(get(x,y+1)===T.ROAD_V) set(x,y+1,T.CROSS);
          else set(x,y+1,T.ROAD_H);
        }
      }
    }

    // Buildings in each block
    // Road is at 0, 1. Sidewalk is at 2. Building area is 3 to 14.
    for(let bx=0;bx<SZ;bx+=BLOCK){
      for(let by=0;by<SZ;by+=BLOCK){
        if(bx+14>=SZ || by+14>=SZ) continue;
        const zone = getZone(bx,by);
        
        // Random layout variations
        const r = Math.random();
        if(r < 0.33) {
          // Layout 1: Two medium buildings, parking in front
          fill(bx+4, by+10, 8, 3, T.PARKING);
          placeBuilding(bx+3, by+3, 4, 6, zone);
          placeBuilding(bx+9, by+3, 4, 6, zone);
        } else if (r < 0.66) {
          // Layout 2: One large building, side parking
          placeBuilding(bx+3, by+4, 7, 8, zone);
          fill(bx+11, by+4, 3, 8, T.PARKING);
        } else {
          // Layout 3: Long commercial building
          placeBuilding(bx+4, by+6, 8, 5, zone);
          fill(bx+4, by+3, 8, 2, T.PARKING);
        }
      }
    }

    // Spawn vehicles randomly across the map on valid road lanes
    const vtypes = Object.keys(VDEF);
    for(let i=0; i<150; i++){
      const vt = vtypes[Math.floor(Math.random()*vtypes.length)];
      if(vt==='police') continue;
      
      // Pick random block
      const bx = Math.floor(Math.random()*(SZ/BLOCK))*BLOCK;
      const by = Math.floor(Math.random()*(SZ/BLOCK))*BLOCK;
      
      if(Math.random() < 0.5){
        // Horizontal road right lane (y=by+1), direction=0 (right)
        const v1 = makeVehicle(vt, bx + 2 + Math.random()*(BLOCK-4), by+1.5, 0);
        v1.speed = 3.0;
        vehicles.push(v1);
      } else {
        // Vertical road down lane (x=bx), direction=PI/2 (down)
        const v2 = makeVehicle(vt, bx+0.5, by + 2 + Math.random()*(BLOCK-4), Math.PI/2);
        v2.speed = 3.0;
        vehicles.push(v2);
      }
    }
    
    // Spawn police
    for(let i=0;i<10;i++){
      const bx = Math.floor(Math.random()*(SZ/BLOCK))*BLOCK;
      const by = Math.floor(Math.random()*(SZ/BLOCK))*BLOCK;
      const v = makeVehicle('police', bx+4, by+1.5, 0);
      v.speed = 3.0;
      vehicles.push(v);
    }
  }

  return { generate, get, set, solid, fill, map, buildings, vehicles, makeVehicle, getZone, SZ };
})();


// ═══════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════
const Cam = {
  x:0, y:0, tw:0, th:0,
  update(px,py,cw,ch){
    const tw=cw/TILE, th=ch/TILE;
    this.tw=tw; this.th=th;
    this.x += (px-tw/2-this.x)*.12;
    this.y += (py-th/2-this.y)*.12;
    this.x = Math.max(0,Math.min(World.SZ-tw,this.x));
    this.y = Math.max(0,Math.min(World.SZ-th,this.y));
  }
};

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
const Keys = {};
const Mouse = {wx:4,wy:4,left:false,right:false};
const Touch = {jx:0,jy:0,jActive:false,btnA:false,btnB:false,btnX:false,btnY:false};
let _jBase = {cx:0,cy:0};
let _prevF = false;

document.addEventListener('keydown', e => {
  Keys[e.code] = true;
  if(e.code==='Escape'){e.preventDefault();if(G.running)togglePause();}
  if(e.code==='KeyR'&&G.inVehicle) Aud.radioNext();
  if(e.code==='Tab') e.preventDefault();
  const n=parseInt(e.key); if(n>=1&&n<=9) G.player.activeSlot=n-1;
});
document.addEventListener('keyup', e => { Keys[e.code]=false; });

const canvas = document.getElementById('c');
canvas.addEventListener('mousemove', e => {
  const r=canvas.getBoundingClientRect();
  Mouse.wx = Cam.x+(e.clientX-r.left)/TILE;
  Mouse.wy = Cam.y+(e.clientY-r.top)/TILE;
});
canvas.addEventListener('mousedown', e => {
  if(e.button===0) Mouse.left=true;
  if(e.button===2) Mouse.right=true;
});
canvas.addEventListener('mouseup', e => {
  if(e.button===0) Mouse.left=false;
  if(e.button===2) Mouse.right=false;
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
canvas.addEventListener('wheel', e => {
  const p=G.player;
  p.activeSlot=(p.activeSlot+(e.deltaY>0?1:-1)+9)%9;
});

function setupTouch(){
  if(!('ontouchstart' in window)) return;
  document.getElementById('mc').style.display='block';
  const jb=document.getElementById('jb'), jt=document.getElementById('jt');
  jb.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0], r=jb.getBoundingClientRect();
    _jBase={cx:r.left+r.width/2,cy:r.top+r.height/2};
    Touch.jActive=true;
  },{passive:false});
  jb.addEventListener('touchmove',e=>{
    e.preventDefault();
    const t=e.touches[0];
    const dx=t.clientX-_jBase.cx, dy=t.clientY-_jBase.cy;
    const dist=Math.min(Math.hypot(dx,dy),50);
    const ang=Math.atan2(dy,dx);
    Touch.jx=Math.cos(ang)*dist/50; Touch.jy=Math.sin(ang)*dist/50;
    jt.style.left=(50+Math.cos(ang)*dist*.72)+'%';
    jt.style.top=(50+Math.sin(ang)*dist*.72)+'%';
  },{passive:false});
  jb.addEventListener('touchend',e=>{
    e.preventDefault();Touch.jx=0;Touch.jy=0;Touch.jActive=false;
    jt.style.left='50%'; jt.style.top='50%';
  },{passive:false});
  [['ba','btnA'],['bb','btnB'],['bx','btnX'],['by','btnY']].forEach(([id,prop])=>{
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();Touch[prop]=true;},{passive:false});
    el.addEventListener('touchend',  e=>{e.preventDefault();Touch[prop]=false;},{passive:false});
  });
}

// ═══════════════════════════════════════════════
//  PLAYER
// ═══════════════════════════════════════════════
function makePlayer(x,y){
  return {x,y,angle:Math.PI/2,hp:100,maxHp:100,armor:0,money:500,
    activeSlot:0, inventory:Array(9).fill(null),
    shootTimer:0, stepTimer:0, interactCd:0, dead:false,
    w:.55, h:.55,
    // animation
    walkFrame:0, walkTimer:0, moving:false};
}
function initPlayerInv(p){
  p.inventory[0]={type:0,ammo:1e9,name:'Fists'};
}

function collidesMap(x,y,w,h){
  const hw=w/2, hh=h/2;
  return World.solid(x-hw,y-hh)||World.solid(x+hw,y-hh)||
         World.solid(x-hw,y+hh)||World.solid(x+hw,y+hh);
}

function updatePlayer(p,dt){
  if(p.dead) return;
  p.shootTimer  = Math.max(0,p.shootTimer-dt);
  p.interactCd  = Math.max(0,p.interactCd-dt);

  if(G.inVehicle){ p.x=G.inVehicle.x; p.y=G.inVehicle.y; return; }

  let dx=0, dy=0, moving=false;
  
  if(Keys['KeyW']||Keys['ArrowUp'])   { dy = -1; }
  if(Keys['KeyS']||Keys['ArrowDown']) { dy = 1; }
  if(Keys['KeyA']||Keys['ArrowLeft']) { dx = -1; }
  if(Keys['KeyD']||Keys['ArrowRight']){ dx = 1; }
  
  const touchMove = Touch.jActive && Math.hypot(Touch.jx,Touch.jy)>.1;
  if(touchMove){
    if(Math.abs(Touch.jx) > Math.abs(Touch.jy)){
      dx = Touch.jx > 0 ? 1 : -1; dy = 0;
    } else {
      dy = Touch.jy > 0 ? 1 : -1; dx = 0;
    }
  }

  // Prevent diagonal movement (strict 4-directional)
  if(dx !== 0 && dy !== 0) { dx = 0; } // Prioritize vertical or horizontal, up to you. Let's just normalize or keep strict 4 dirs.
  
  if(dx !== 0 || dy !== 0) {
    moving = true;
    p.angle = Math.atan2(dy, dx);
  }

  // Mouse aim overrides visual angle ONLY when shooting
  const shooting = Keys['Space']||Mouse.left||Touch.btnB;
  if(shooting && (Mouse.left || Mouse.right)){
    p.angle = Math.atan2(Mouse.wy-p.y, Mouse.wx-p.x);
  }

  const run = Keys['ShiftLeft']||Keys['ShiftRight']||Touch.btnX;
  const spd = moving ? (run?4.0:2.2) : 0; // Slightly faster for orthogonal movement

  if(moving){
    const nx = p.x + dx * spd * dt;
    const ny = p.y + dy * spd * dt;
    
    // Slide along walls
    if(!collidesMap(nx, p.y, p.w, p.h)) p.x = nx;
    if(!collidesMap(p.x, ny, p.w, p.h)) p.y = ny;
    
    p.x = Math.max(.5, Math.min(World.SZ-.5, p.x));
    p.y = Math.max(.5, Math.min(World.SZ-.5, p.y));
  }
  p.moving = moving;

  // Walk animation
  if(moving){
    p.walkTimer-=dt;
    if(p.walkTimer<=0){ p.walkFrame=(p.walkFrame+1)%4; p.walkTimer=run?.1:.16; }
    p.stepTimer-=dt; if(p.stepTimer<=0){Aud.step();p.stepTimer=run?.18:.3;}
  } else {
    // Reset to idle frame
    p.walkFrame = 0;
  }

  // Shoot
  if(shooting&&p.shootTimer<=0) fireWeapon(p);



  // Interact
  const interacting = Keys['KeyF']||Keys['KeyE']||Touch.btnA;
  if(interacting&&p.interactCd<=0){ p.interactCd=.5; doInteract(p); }

  // Auto-collect pickups
  for(let i=Pickups.length-1;i>=0;i--){
    const pk=Pickups[i];
    if(Math.hypot(pk.x-p.x,pk.y-p.y)<.9){ giveItem(p,pk.type,pk.ammo); Pickups.splice(i,1); Aud.pickup(); }
  }
}

function damagePlayer(p,amt){
  if(p.dead) return;
  if(p.armor>0){ const ab=Math.min(p.armor,amt*.5); p.armor-=ab; amt-=ab; }
  p.hp-=amt;
  if(p.hp<=0){ p.hp=0; killPlayer(p); }
}

function killPlayer(p){
  p.dead=true; Aud.death();
  p.inventory.forEach((it,i)=>{
    if(it&&i>0){ Pickups.push({x:p.x+(Math.random()-.5),y:p.y+(Math.random()-.5),type:it.type,ammo:it.ammo}); p.inventory[i]=null; }
  });
  p.money=Math.floor(p.money*.5);
  const el=document.getElementById('died'); el.style.display='flex';
  if(G.inVehicle){ G.inVehicle.driver=null; G.inVehicle=null; Aud.stopEngine(); Aud.radioOff(); }
  setTimeout(()=>{ el.style.display='none'; respawnPlayer(p); },3000);
}

function respawnPlayer(p){
  const hosp=World.buildings.find(b=>b.type==='hospital');
  p.x=hosp?hosp.doorX+.5:BLOCK+1; p.y=hosp?hosp.doorY+2:BLOCK+1;
  // Make sure spawn is not on solid
  if(collidesMap(p.x,p.y,p.w,p.h)){ p.x=1.5; p.y=1.5; }
  p.hp=70; p.armor=0; p.dead=false; p.walkFrame=0;
  Wanted.level=0; Wanted.timer=0; Aud.sirenOff();
}

// ═══════════════════════════════════════════════
//  INVENTORY
// ═══════════════════════════════════════════════
function giveItem(p,type,ammo){
  ammo = ammo||WPNDEF[type].ammoMax;
  const ex=p.inventory.findIndex(s=>s&&s.type===type);
  if(ex>=0){ p.inventory[ex].ammo=Math.min(p.inventory[ex].ammo+ammo,WPNDEF[type].ammoMax); return; }
  const em=p.inventory.findIndex((s,i)=>!s&&i>0);
  if(em>=0){ p.inventory[em]={type,ammo,name:WPNDEF[type].name}; return; }
  const sl=p.activeSlot>0?p.activeSlot:1;
  if(p.inventory[sl]) Pickups.push({x:p.x,y:p.y+.8,type:p.inventory[sl].type,ammo:p.inventory[sl].ammo});
  p.inventory[sl]={type,ammo,name:WPNDEF[type].name};
}

function fireWeapon(p){
  const sl=p.inventory[p.activeSlot]; if(!sl) return;
  const wd=WPNDEF[sl.type];
  if(sl.type===7){ p.hp=Math.min(p.maxHp,p.hp+50); p.inventory[p.activeSlot]=null; return; }
  if(sl.type===8){ p.armor=100; p.inventory[p.activeSlot]=null; return; }
  if(sl.type===0||sl.ammo>0){
    if(sl.type!==0){ sl.ammo--; if(sl.ammo<=0) p.inventory[p.activeSlot]=null; }
    p.shootTimer=wd.rate;
    const n=sl.type===2?5:1;
    for(let i=0;i<n;i++){
      const ang=p.angle+(Math.random()-.5)*wd.spread*2;
      if(sl.type===5) spawnGrenade(p.x,p.y,ang,wd);
      else if(sl.type===6) spawnMolotov(p.x,p.y,ang,wd);
      else spawnBullet(p.x,p.y,ang,wd,p);
    }
    if(sl.type===2) Aud.shotgun(); else if(sl.type>0) Aud.shot();
  }
}

// ═══════════════════════════════════════════════
//  VEHICLE
// ═══════════════════════════════════════════════
function enterVehicle(p,v){
  if(G.inVehicle) return;
  if(v.driver&&v.driver!==p){ v.driver.x=v.x+1.5; v.driver.y=v.y; v.driver=null; Wanted.add(1); }
  G.inVehicle=v; v.driver=p; Aud.radioOn();
}

function exitVehicle(p,v){
  if(!G.inVehicle) return;
  const spd=Math.abs(v.speed);
  p.x=v.x+Math.cos(v.angle+Math.PI/2)*2;
  p.y=v.y+Math.sin(v.angle+Math.PI/2)*2;
  if(spd>3) damagePlayer(p,spd*4);
  v.driver=null; G.inVehicle=null; Aud.stopEngine(); Aud.radioOff();
}

function damageVehicle(v,amt){
  v.hp-=amt;
  if(v.hp<=0&&!v.burning){ v.hp=0; v.burning=true; v.burnTimer=3; }
}

function updateVehicle(v,dt,isPlayer){
  if(v.dead) return;
  if(v.burning){
    v.burnTimer-=dt;
    spawnParticle(v.x+(Math.random()-.5)*.8, v.y+(Math.random()-.5)*.8,'#ff6600',.5+Math.random()*.3);
    if(v.burnTimer<=0){ explodeVehicle(v); return; }
  }
  const d=VDEF[v.type]; let accel=0,turn=0;
  if(isPlayer){
    if(Keys['KeyW']||Keys['ArrowUp']  ||Touch.jy<-.2) accel=1;
    if(Keys['KeyS']||Keys['ArrowDown']||Touch.jy>.2)  accel=-1;
    if(Keys['KeyA']||Keys['ArrowLeft']||Touch.jx<-.2) turn=-1;
    if(Keys['KeyD']||Keys['ArrowRight']||Touch.jx>.2) turn=1;
    const fNow=Keys['KeyF']||Touch.btnA;
    if(fNow&&!_prevF) exitVehicle(G.player,v);
    _prevF=fNow;
    // Shoot from vehicle
    G.player.shootTimer=Math.max(0,G.player.shootTimer-dt);
    if((Keys['Space']||Mouse.left||Touch.btnB)&&G.player.shootTimer<=0){
      G.player.angle=Math.atan2(Mouse.wy-v.y,Mouse.wx-v.x);
      fireWeapon(G.player);
    }
  } else if(!v.driver) {
    // Basic ambient traffic AI
    accel = 0.8; // Drive faster
  }
  v.speed+=accel*d.ac*dt;
  v.speed*=Math.pow(1-d.fr*dt,1);
  v.speed=Math.max(-d.ms*.3,Math.min(d.ms,v.speed));
  if(Math.abs(v.speed)<.01) v.speed=0;
  if(Math.abs(v.speed)>.05) v.angle+=turn*d.tr*(v.speed/d.ms)*dt;
  const nx=v.x+Math.cos(v.angle)*v.speed*dt;
  const ny=v.y+Math.sin(v.angle)*v.speed*dt;
  if(!collidesMap(nx,v.y,v.w+.2,v.h)){ v.x=nx; }
  else { if(Math.abs(v.speed)>1.5) Aud.crash(); v.speed*=-.3; }
  if(!collidesMap(v.x,ny,v.w,v.h+.2)){ v.y=ny; }
  else { if(Math.abs(v.speed)>1.5) Aud.crash(); v.speed*=-.3; }
  v.x=Math.max(.5,Math.min(World.SZ-.5,v.x));
  v.y=Math.max(.5,Math.min(World.SZ-.5,v.y));
  if(isPlayer) Aud.engine(Math.abs(v.speed),d.ms);
  // NPC hit
  for(const n of NPCs){
    if(!n.dead&&Math.hypot(n.x-v.x,n.y-v.y)<1.3&&Math.abs(v.speed)>1){
      damageNPC(n,Math.abs(v.speed)*10);
      if(isPlayer){ if(n.isPolice)Wanted.add(2);else Wanted.add(1); }
    }
  }
}

function explodeVehicle(v){
  v.dead=true; v.burning=false; Aud.explode();
  for(let i=0;i<15;i++) spawnParticle(v.x+(Math.random()-.5)*2,v.y+(Math.random()-.5)*2,Math.random()<.5?'#ff8800':'#ffdd00',.7+Math.random()*.5);
  if(G.inVehicle===v){ exitVehicle(G.player,v); damagePlayer(G.player,60); }
  for(const n of NPCs) if(!n.dead&&Math.hypot(n.x-v.x,n.y-v.y)<3) damageNPC(n,80);
  if(Math.hypot(G.player.x-v.x,G.player.y-v.y)<3) damagePlayer(G.player,80);
  Wanted.add(1);
}

// ═══════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════
function doInteract(p){
  // Vehicles
  for(const v of World.vehicles){
    if(!v.dead&&!v.burning&&Math.hypot(v.x-p.x,v.y-p.y)<2.2){
      if(G.inVehicle===v) exitVehicle(p,v);
      else enterVehicle(p,v);
      return;
    }
  }
  // Buildings
  for(const b of World.buildings){
    if(b.enterable&&Math.hypot(b.doorX+.5-p.x,b.doorY+.5-p.y)<2){
      handleBuilding(b,p); return;
    }
  }
  // Mission NPCs
  for(const n of NPCs){
    if(!n.dead&&n.missionGiver&&Math.hypot(n.x-p.x,n.y-p.y)<2){
      MissionSys.offerAt(n.missionId,p); return;
    }
  }
}

function handleBuilding(b,p){
  if(b.type==='hospital'){
    if(p.money>=200){ p.hp=Math.min(p.maxHp,p.hp+60); p.money-=200; flash('+60 HP (-$200)','#80ff80'); }
    else flash('Sem dinheiro!','#ff4040');
  } else if(b.type==='shop_weapons'){
    if(p.money>=400){ giveItem(p,1,12); giveItem(p,2,6); giveItem(p,3,60); p.money-=400; flash('Armas! -$400','#ffd700'); }
    else flash('Sem dinheiro!','#ff4040');
  } else if(b.type==='shop_food'){
    if(p.money>=120){ p.hp=Math.min(p.maxHp,p.hp+35); p.money-=120; flash('+35 HP (-$120)','#80ff80'); }
    else flash('Sem dinheiro!','#ff4040');
  } else if(b.type==='safe_house'){
    p.hp=Math.min(p.maxHp,p.hp+20); Wanted.level=Math.max(0,Wanted.level-1);
    Save.save(); flash('Jogo salvo! HP restaurado.','#80ffff');
  } else if(b.type==='bank'){
    if(Wanted.level<3) flash('Banco — precisas de *3 estrelas* para roubar!','#ffd700');
    else { p.money+=5000; Wanted.add(3); flash('+$5000 ROUBADO! Fuja!','#ff4040'); }
  } else if(b.type==='mission_giver'){
    const avail=MissionSys.missions.filter(m=>!m.done&&!m.active);
    if(avail.length>0) MissionSys.start(avail[0].id,p);
    else flash('Sem missoes disponiveis.','#aaaaaa');
  } else if(b.type==='warehouse'){
    flash('Armazem — area de missao','#aaaaff');
  }
}

// ═══════════════════════════════════════════════
//  PROJECTILES, FIRES, PARTICLES
// ═══════════════════════════════════════════════
const Bullets=[],Grenades=[],Fires=[],Particles=[];
const Pickups=[];

function spawnBullet(x,y,ang,wd,owner){
  Bullets.push({x,y,ang,spd:22,range:wd.range,dist:0,dmg:wd.dmg,owner,dead:false});
}
function spawnGrenade(x,y,ang,wd){
  Grenades.push({x,y,ang,spd:6,range:wd.range,dist:0,dmg:wd.dmg,timer:2,type:'grenade',dead:false});
}
function spawnMolotov(x,y,ang,wd){
  Grenades.push({x,y,ang,spd:5,range:wd.range,dist:0,dmg:wd.dmg,timer:10,type:'molotov',dead:false});
}
function spawnParticle(x,y,col,life){
  Particles.push({x,y,col,life,maxLife:life,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3});
}

function updateBullets(dt){
  for(let i=Bullets.length-1;i>=0;i--){
    const b=Bullets[i]; if(b.dead){Bullets.splice(i,1);continue;}
    b.x+=Math.cos(b.ang)*b.spd*dt; b.y+=Math.sin(b.ang)*b.spd*dt; b.dist+=b.spd*dt;
    if(b.dist>=b.range||World.solid(b.x,b.y)){Bullets.splice(i,1);continue;}
    let hit=false;
    for(const n of NPCs){
      if(!n.dead&&Math.hypot(n.x-b.x,n.y-b.y)<.5){
        damageNPC(n,b.dmg); if(b.owner===G.player&&n.isPolice) Wanted.add(2);
        else if(b.owner===G.player) Wanted.add(1);
        hit=true; break;
      }
    }
    if(!hit) for(const v of World.vehicles){
      if(!v.dead&&v!==G.inVehicle&&Math.hypot(v.x-b.x,v.y-b.y)<v.w){ damageVehicle(v,b.dmg*.5); hit=true; break; }
    }
    if(!hit&&b.owner!==G.player&&Math.hypot(G.player.x-b.x,G.player.y-b.y)<.5){
      damagePlayer(G.player,b.dmg); hit=true;
    }
    if(hit) Bullets.splice(i,1);
  }
}

function updateGrenades(dt){
  for(let i=Grenades.length-1;i>=0;i--){
    const g=Grenades[i]; if(g.dead){Grenades.splice(i,1);continue;}
    g.timer-=dt;
    const nx=g.x+Math.cos(g.ang)*g.spd*dt, ny=g.y+Math.sin(g.ang)*g.spd*dt;
    g.dist+=g.spd*dt;
    if(World.solid(nx,ny)||g.dist>g.range||(g.type==='grenade'&&g.timer<=0)){
      if(g.type==='molotov'){ Fires.push({x:g.x,y:g.y,timer:5,dmg:g.dmg}); }
      else { doExplosion(g.x,g.y,g.dmg,3); Aud.explode(); Wanted.add(1); }
      g.dead=true;
    } else { g.x=nx; g.y=ny; }
  }
}

function doExplosion(x,y,dmg,r){
  for(let i=0;i<18;i++) spawnParticle(x+(Math.random()-.5)*r,y+(Math.random()-.5)*r,Math.random()<.5?'#ff8800':'#ffee00',.6+Math.random()*.5);
  for(const n of NPCs) if(!n.dead&&Math.hypot(n.x-x,n.y-y)<r) damageNPC(n,dmg);
  if(Math.hypot(G.player.x-x,G.player.y-y)<r) damagePlayer(G.player,dmg);
  for(const v of World.vehicles) if(!v.dead&&Math.hypot(v.x-x,v.y-y)<r) damageVehicle(v,dmg);
}

function updateFires(dt){
  for(let i=Fires.length-1;i>=0;i--){
    const f=Fires[i]; f.timer-=dt;
    if(f.timer<=0){Fires.splice(i,1);continue;}
    if(Math.random()<.4) spawnParticle(f.x+(Math.random()-.5)*.4,f.y+(Math.random()-.5)*.4,'#ff6600',.3);
    if(Math.hypot(G.player.x-f.x,G.player.y-f.y)<.7) damagePlayer(G.player,f.dmg*dt);
    for(const n of NPCs) if(!n.dead&&Math.hypot(n.x-f.x,n.y-f.y)<.7) damageNPC(n,f.dmg*dt);
  }
}

function updateParticles(dt){
  for(let i=Particles.length-1;i>=0;i--){
    const pt=Particles[i]; pt.life-=dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vx*=.88; pt.vy*=.88;
    if(pt.life<=0) Particles.splice(i,1);
  }
}

// ═══════════════════════════════════════════════
//  NPCs & AI
// ═══════════════════════════════════════════════
const NPCs = [];
function makeNPC(type,x,y){
  const hp=type==='police'?100:type==='gang'?80:50;
  return {type,x,y,hp,maxHp:hp,dead:false,angle:Math.random()*Math.PI*2,
    state:'idle',timer:0,target:null,w:.5,h:.5,
    isPolice:type==='police', isGang:type==='gang',
    missionGiver:type==='mission', missionId:null,
    walkFrame:0,walkTimer:0,moving:false,shootTimer:0};
}

function spawnNPCs(){
  // Civilians
  for(let i=0;i<40;i++) NPCs.push(makeNPC('civ', Math.random()*World.SZ, Math.random()*World.SZ));
  // Gangs
  for(let i=0;i<15;i++) NPCs.push(makeNPC('gang', Math.random()*World.SZ, Math.random()*World.SZ));
  // Mission givers
  const m1=World.buildings.find(b=>b.type==='mission_giver');
  if(m1){ const n=makeNPC('mission',m1.doorX+.5,m1.doorY+1.5); n.missionId='m1'; NPCs.push(n); }
}

function damageNPC(n,amt){
  if(n.dead) return;
  n.hp-=amt;
  if(n.hp<=0){
    n.dead=true; n.hp=0; Aud.death();
    if(Math.random()<.3) Pickups.push({x:n.x,y:n.y,type:Math.random()<.5?7:1});
    if(!n.isPolice) Pickups.push({x:n.x+.2,y:n.y,type:-1,ammo:Math.floor(Math.random()*50)+10});
  } else {
    n.state='flee'; n.timer=5; n.target=G.player;
  }
}

function updateNPCs(dt){
  for(let i=NPCs.length-1;i>=0;i--){
    const n=NPCs[i];
    if(n.dead){
      n.timer+=dt; if(n.timer>10) NPCs.splice(i,1);
      continue;
    }
    const distP=Math.hypot(G.player.x-n.x, G.player.y-n.y);
    n.shootTimer=Math.max(0,n.shootTimer-dt);

    // Logic
    if(n.missionGiver){ n.moving=false; continue; }

    if(n.isPolice){
      if(Wanted.level>0){ n.state='pursue'; n.target=G.player; }
      else if(n.state==='pursue') n.state='patrol';
    } else if(n.isGang){
      if(distP<5 && Wanted.level>0 && Math.random()<.05) n.state='attack';
    }

    if(n.state==='idle'){
      n.moving=false; n.timer-=dt;
      if(n.timer<=0){ n.state='patrol'; n.timer=2+Math.random()*3; n.angle=Math.random()*Math.PI*2; }
    } else if(n.state==='patrol'){
      n.moving=true; n.timer-=dt;
      if(n.timer<=0) n.state='idle';
    } else if(n.state==='flee'){
      n.moving=true; n.timer-=dt;
      if(n.target) n.angle=Math.atan2(n.y-n.target.y, n.x-n.target.x);
      if(n.timer<=0) n.state='idle';
    } else if(n.state==='pursue'||n.state==='attack'){
      if(n.target){
        n.angle=Math.atan2(n.target.y-n.y, n.target.x-n.x);
        if(distP>3) n.moving=true; else n.moving=false;
        if(distP<6 && n.shootTimer<=0){
          n.shootTimer = n.isPolice ? (1.5 - Wanted.level*.2) : 1.2;
          spawnBullet(n.x,n.y,n.angle,WPNDEF[1],n); Aud.shot();
        }
      }
    }

    // Movement
    if(n.moving){
      const spd = (n.state==='pursue'||n.state==='flee') ? 3 : 1.2;
      const nx=n.x+Math.cos(n.angle)*spd*dt, ny=n.y+Math.sin(n.angle)*spd*dt;
      if(!collidesMap(nx,ny,n.w,n.h)){ n.x=nx; n.y=ny; }
      else { n.angle+=Math.PI/2; } // turn if hit wall
      n.walkTimer-=dt;
      if(n.walkTimer<=0){ n.walkFrame=(n.walkFrame+1)%4; n.walkTimer=.15; }
    }
  }
}

const Wanted = {
  level:0, timer:0,
  add(amt){
    if(this.level===0) Aud.sirenOn();
    this.level=Math.min(5,this.level+amt);
    this.timer=15+this.level*10; // 25s to 65s
    flash('Nivel de Procurado: '+this.level+' Estrelas!','#ff4040');
  },
  update(dt){
    if(this.level>0){
      this.timer-=dt;
      if(this.timer<=0){
        this.level--;
        if(this.level>0) this.timer=15+this.level*10;
        else Aud.sirenOff();
      }
      // spawn cops
      if(Math.random() < 0.01 * this.level){
        const ang=Math.random()*Math.PI*2;
        const d=15;
        const cx=G.player.x+Math.cos(ang)*d, cy=G.player.y+Math.sin(ang)*d;
        if(!World.solid(cx,cy)) NPCs.push(makeNPC('police',cx,cy));
      }
    }
  }
};

const MissionSys = {
  active:null,
  missions:[
    {id:'m1',name:'Entrega Rapida',desc:'Leve o pacote ate o armazem.',targetType:'building',targetId:'warehouse',reward:500},
    {id:'m2',name:'Limpeza',desc:'Elimine 5 membros de gangue.',targetType:'kill',count:5,reward:1000},
  ],
  offerAt(id,p){
    const m=this.missions.find(x=>x.id===id);
    if(m&&!m.done&&!this.active){
      flash('Nova Missao: '+m.name+' - Pressione F para aceitar','#ffd700');
      // Hacky auto-accept for now:
      this.start(id,p);
    }
  },
  start(id,p){
    const m=this.missions.find(x=>x.id===id);
    if(!m)return;
    this.active=m; m.progress=0;
    flash('Missao Iniciada: '+m.name,'#ffd700');
  },
  update(dt){
    if(!this.active) return;
    const m=this.active;
    if(m.targetType==='building'){
      const b=World.buildings.find(x=>x.type===m.targetId);
      if(b && Math.hypot(G.player.x-(b.doorX+.5), G.player.y-(b.doorY+.5))<2){
        this.complete();
      }
    }
  },
  onKill(type){
    if(this.active && this.active.targetType==='kill' && type==='gang'){
      this.active.progress++;
      if(this.active.progress >= this.active.count) this.complete();
    }
  },
  complete(){
    const m=this.active;
    G.player.money+=m.reward;
    m.done=true; this.active=null;
    const el=document.getElementById('missionComplete');
    document.getElementById('mcReward').innerText='+$'+m.reward;
    el.style.display='flex';
    Aud.money();
    setTimeout(()=>el.style.display='none',3000);
  }
};

// ═══════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════
const ctx = canvas.getContext('2d', {alpha:false});

function drawTile(c, t, x, y){
  const uv = TILE_UV[t];
  if(uv && Assets.tileset){
    c.drawImage(Assets.tileset, uv[1]*TILE, uv[0]*TILE, TILE, TILE, x, y, TILE, TILE);
  } else {
    c.fillStyle = TCOLORS[t]||'#000';
    c.fillRect(x, y, TILE, TILE);
  }
}

function getSpriteRowDir(ang){
  // Map angle to sprite row: 0=down, 1=left, 2=right, 3=up
  const a = (ang+Math.PI*2)%(Math.PI*2);
  if(a>=Math.PI/4 && a<3*Math.PI/4) return 0; // down
  if(a>=3*Math.PI/4 && a<5*Math.PI/4) return 1; // left
  if(a>=5*Math.PI/4 && a<7*Math.PI/4) return 3; // up
  return 2; // right
}

function drawEntity(c, e, cx, cy){
  c.save();
  c.translate(e.x*TILE-cx, e.y*TILE-cy);

  // Cars
  if(e.hp!==undefined && e.driver!==undefined){ // is vehicle
    c.rotate(e.angle + Math.PI/2);
    if(Assets.carPink){
      // use pink car for all for now, or pick row based on carCol
      const sH = Assets.carPink.height/4;
      const row = (e.type==='police') ? 3 : 0; // simplistic
      c.drawImage(Assets.carPink, 0, row*sH, Assets.carPink.width/4, sH, -e.w*TILE/2, -e.h*TILE/2, e.w*TILE, e.h*TILE);
    } else {
      c.fillStyle = e.col;
      c.fillRect(-e.w*TILE/2, -e.h*TILE/2, e.w*TILE, e.h*TILE);
    }
    c.restore(); return;
  }

  // Characters
  const isPlayer = (e === G.player);
  const img = isPlayer ? Assets.charPurple :
              (e.isPolice ? Assets.charGang : (e.isGang ? Assets.charGang : Assets.charGirl));

  if(img){
    const row = getSpriteRowDir(e.angle);
    // Columns: 0=Idle, 1=StepLeft, 2=Idle, 3=StepRight
    const walkCols = [0, 1, 0, 3];
    const col = e.moving ? walkCols[e.walkFrame] : 0;
    const sW = img.width/4, sH = img.height/4;
    
    // Basic shadow to separate from background
    c.fillStyle='rgba(0,0,0,0.3)';
    c.beginPath(); c.ellipse(0, TILE/4, TILE/4, TILE/8, 0, 0, Math.PI*2); c.fill();

    // Multiply blend to remove white bg if present (hack)
    c.globalCompositeOperation = 'multiply';
    c.drawImage(img, col*sW, row*sH, sW, sH, -TILE/2, -TILE/2, TILE, TILE);
    c.globalCompositeOperation = 'source-over';
    // Draw again normally to keep colors bright (will show white bg if not transparent, but looks okay on dark road)
    c.drawImage(img, col*sW, row*sH, sW, sH, -TILE/2, -TILE/2, TILE, TILE);
  } else {
    c.rotate(e.angle);
    c.fillStyle = isPlayer ? '#c080ff' : (e.isPolice?'#24c':e.isGang?'#a22':'#ccc');
    c.beginPath(); c.arc(0,0,e.w*TILE/2,0,Math.PI*2); c.fill();
    c.fillStyle='#000'; c.fillRect(0,-3,e.w*TILE/2,6); // direction indicator
  }
  c.restore();
}

function drawWorld(){
  const cw=canvas.width, ch=canvas.height;
  Cam.update(G.player.x, G.player.y, cw, ch);
  const cx=Cam.x*TILE, cy=Cam.y*TILE;

  ctx.fillStyle='#0a0015'; ctx.fillRect(0,0,cw,ch);

  const startX = Math.max(0, Math.floor(Cam.x));
  const startY = Math.max(0, Math.floor(Cam.y));
  const endX = Math.min(World.SZ, startX + Cam.tw + 1);
  const endY = Math.min(World.SZ, startY + Cam.th + 1);

  // Base map
  for(let y=startY; y<endY; y++){
    for(let x=startX; x<endX; x++){
      drawTile(ctx, World.get(x,y), x*TILE-cx, y*TILE-cy);
    }
  }

  // Draw building facades over the building footprint tiles (BWALL)
  for(const b of World.buildings){
    if(b.x+b.w<startX||b.x>endX||b.y+b.h<startY||b.y>endY) continue;
    if(Assets.facades){
      const fW = Assets.facades.width / 4;
      const fH = Assets.facades.height / 4;
      const fCol = b.id % 4;
      const fRow = Math.floor(b.id / 4) % 4;
      ctx.drawImage(Assets.facades, fCol*fW, fRow*fH, fW, fH, b.x*TILE-cx, b.y*TILE-cy, b.w*TILE, b.h*TILE);
    }
    if(b.enterable){
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(b.doorX*TILE-cx, b.doorY*TILE-cy, TILE, TILE);
      ctx.fillStyle='#ff0';
      ctx.font='14px monospace'; ctx.textAlign='center';
      ctx.fillText(b.type,(b.doorX+.5)*TILE-cx, b.doorY*TILE-cy-10);
    }
  }

  // Pickups
  for(const pk of Pickups){
    ctx.fillStyle = pk.type<0 ? '#0f0' : WPNDEF[pk.type].col;
    ctx.beginPath(); ctx.arc(pk.x*TILE-cx, pk.y*TILE-cy, 6, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.stroke();
  }

  // Entities
  const ents = [...NPCs, ...World.vehicles, G.player].sort((a,b)=>a.y-b.y);
  for(const e of ents) if(!e.dead) drawEntity(ctx, e, cx, cy);

  // Bullets & Particles
  for(const b of Bullets){
    ctx.fillStyle='#ff0'; ctx.beginPath();
    ctx.arc(b.x*TILE-cx, b.y*TILE-cy, 3, 0, Math.PI*2); ctx.fill();
  }
  for(const g of Grenades){
    ctx.fillStyle=g.type==='molotov'?'#f80':'#484'; ctx.beginPath();
    ctx.arc(g.x*TILE-cx, g.y*TILE-cy, 5, 0, Math.PI*2); ctx.fill();
  }
  for(const f of Fires){
    ctx.fillStyle='rgba(255,100,0,'+(f.timer/5)+')'; ctx.beginPath();
    ctx.arc(f.x*TILE-cx, f.y*TILE-cy, TILE/2, 0, Math.PI*2); ctx.fill();
  }
  for(const pt of Particles){
    ctx.fillStyle=pt.col; ctx.globalAlpha=pt.life/pt.maxLife;
    ctx.fillRect(pt.x*TILE-cx, pt.y*TILE-cy, 4, 4);
  }
  ctx.globalAlpha=1;

  // Dark overlay based on zone or time
  ctx.fillStyle='rgba(10,0,25,0.2)';
  ctx.fillRect(0,0,cw,ch);
}

// ═══════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════
function drawHUD(){
  const p=G.player;

  // Top Right: Money & HP
  ctx.textAlign='right'; ctx.font='bold 24px Courier New';
  ctx.fillStyle='#80ff80'; ctx.fillText('$'+p.money, canvas.width-20, 40);
  
  ctx.fillStyle='#ff4060'; ctx.fillText('♥ '+Math.floor(p.hp), canvas.width-20, 70);
  if(p.armor>0){ ctx.fillStyle='#40a0ff'; ctx.fillText('🛡 '+Math.floor(p.armor), canvas.width-20, 100); }

  // Wanted Stars
  if(Wanted.level>0){
    ctx.fillStyle='#ffd700'; ctx.font='28px Courier New';
    let stars=''; for(let i=0;i<Wanted.level;i++) stars+='★';
    ctx.fillText(stars, canvas.width-20, 135);
  }

  // Top Left: Mission
  if(MissionSys.active){
    ctx.textAlign='left'; ctx.fillStyle='#ffd700'; ctx.font='bold 18px Courier New';
    ctx.fillText('Missão: '+MissionSys.active.name, 20, 40);
  }

  // Bottom Center/Right: Inventory
  ctx.textAlign='center';
  const sl=p.inventory[p.activeSlot];
  if(sl){
    ctx.fillStyle=WPNDEF[sl.type].col; ctx.font='bold 20px Courier New';
    const text = sl.type===0 ? sl.name : `${sl.name} (${sl.ammo})`;
    ctx.fillText(text, canvas.width/2, canvas.height- (Touch.jActive?260:40));
  }
}

function flash(msg,col='#fff'){
  const el=document.getElementById('flashMsg');
  el.innerText=msg; el.style.color=col; el.style.borderColor=col;
  el.style.display='block';
  setTimeout(()=>el.style.display='none', 2500);
}

// ═══════════════════════════════════════════════
//  SAVE SYSTEM
// ═══════════════════════════════════════════════
const Save = {
  save(){
    const s={
      x:G.player.x, y:G.player.y, hp:G.player.hp, armor:G.player.armor,
      money:G.player.money, inv:G.player.inventory, slot:G.player.activeSlot,
      mDone:MissionSys.missions.map(m=>m.done)
    };
    localStorage.setItem('cc_save', JSON.stringify(s));
  },
  load(){
    try{
      const d=localStorage.getItem('cc_save');
      if(!d)return false;
      const s=JSON.parse(d);
      const p=G.player;
      p.x=s.x; p.y=s.y; p.hp=s.hp; p.armor=s.armor||0; p.money=s.money;
      p.inventory=s.inv; p.activeSlot=s.slot;
      if(s.mDone) s.mDone.forEach((d,i)=>{if(MissionSys.missions[i])MissionSys.missions[i].done=d;});
      return true;
    }catch(e){return false;}
  }
};

// ═══════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════
const G = {
  running:false, paused:false, lastTime:0, player:null, inVehicle:null
};

function loop(t){
  if(!G.running) return;
  requestAnimationFrame(loop);
  
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  
  let dt = (t-G.lastTime)/1000;
  G.lastTime = t;
  if(dt>0.1) dt=0.1;

  if(!G.paused){
    updatePlayer(G.player,dt);
    for(const v of World.vehicles) updateVehicle(v,dt,G.inVehicle===v);
    updateNPCs(dt);
    updateBullets(dt);
    updateGrenades(dt);
    updateFires(dt);
    updateParticles(dt);
    Wanted.update(dt);
    MissionSys.update(dt);
  }

  drawWorld();
  drawHUD();
}

function startGame(cont){
  document.getElementById('overlay').style.display='none';
  if(!G.player) G.player = makePlayer(World.SZ/2, World.SZ/2);
  
  if(cont && Save.load()){} 
  else {
    initPlayerInv(G.player);
    respawnPlayer(G.player); // Puts player at hospital or default spawn
  }

  Aud.init();
  setupTouch();
  
  G.running=true; G.lastTime=performance.now();
  requestAnimationFrame(loop);
}

function togglePause(){
  G.paused = !G.paused;
  document.getElementById('pause').style.display = G.paused ? 'flex' : 'none';
}

// Init
window.onload = () => {
  World.generate();
  spawnNPCs();
  if(localStorage.getItem('cc_save')) document.getElementById('btnCont').style.display='inline-block';
  Assets.load(()=>{
    console.log('Assets loaded!');
    // Render static title bg
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    ctx.fillStyle='#0a0015'; ctx.fillRect(0,0,canvas.width,canvas.height);
  });
};

Assets.load = function(callback) {
  const keys = Object.keys(B64_ASSETS);
  this.total = keys.length;
  if(this.total === 0) { callback(); return; }
  for (const key of keys) {
    const img = new Image();
    img.onload = () => { this.loaded++; if(this.loaded===this.total) callback(); };
    img.onerror = () => { this.loaded++; if(this.loaded===this.total) callback(); };
    img.src = B64_ASSETS[key];
    this[key] = img;
  }
};
